<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,initial-scale=1">

<title>FILMBOX PLAYER</title>

<script src="https://cdn.jwplayer.com/libraries/TU_LIBRARY_ID.js"></script>

<style>

html,
body{
margin:0;
width:100%;
height:100%;
background:#000;
overflow:hidden;
}

#player{
position:fixed;
inset:0;
width:100vw;
height:100vh;
}

.info{

position:absolute;

top:15px;
left:15px;

z-index:9999;
}

.brand{
color:#e50914;
font-size:13px;
font-weight:bold;
}

.title{
font-size:30px;
font-weight:700;
color:white;
}

</style>

</head>

<body>

<div class="info">

<div class="brand">
Estas viendo FILMBOX
</div>

<div
id="movieTitle"
class="title">
</div>

</div>

<div id="player"></div>

<script>

const params=
new URLSearchParams(location.search);

const title=
params.get("title");

const poster=
params.get("poster");

const backdrop=
params.get("backdrop");

const video=
params.get("video");

document
.getElementById("movieTitle")
.innerText=title;

jwplayer("player").setup({

file:video,

image:backdrop,

width:"100%",

height:"100%",

stretching:"fill",

autostart:false

});

</script>

</body>

</html>
